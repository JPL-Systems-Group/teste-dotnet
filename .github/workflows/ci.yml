name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet restore OrdersApi.sln
      - run: dotnet build OrdersApi.sln --configuration Release --no-restore
      - run: dotnet test tests/Orders.Tests/Orders.Tests.csproj --configuration Release --no-build --collect:"XPlat Code Coverage" --results-directory ./artifacts/test-results
      - uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: artifacts/test-results
          if-no-files-found: error
